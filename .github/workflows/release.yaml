name: GH Release

on:
    push:
        tags:
            - 'v*.*.*'

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
            - uses: bazel-contrib/setup-bazel@0.9.1
              with:
                bazelisk-cache: true
                disk-cache: ${{ github.workflow }}
                repository-cache: true
            - name: Bazel test
              run: |
                bazel test //... --config=ci
            - name: Prepare release
              run: .github/workflows/release-gen.sh ${{ env.GITHUB_REF_NAME }} ${{ env.GITHUB_REPOSITORY }} > release_notes.txt
            - name: Release
              uses: softprops/action-gh-release@v2
              with:
                  generate_release_notes: true
                  body_path: release_notes.txt
                  files: masorange_rules_helm-*.tar.gz
                  fail_on_unmatched_files: true

    # After the GitHub release is created, open a PR against
    # `bazelbuild/bazel-central-registry` from the `masmovil/bazel-central-registry`
    # fork. Replaces the legacy "Publish to BCR" GitHub App (sunset 2026-06-30).
    publish:
        needs: build
        permissions:
            attestations: write
            contents: write
            id-token: write
        uses: ./.github/workflows/publish.yaml
        with:
            tag_name: ${{ github.ref_name }}
        secrets:
            BCR_PUBLISH_TOKEN: ${{ secrets.BCR_PUBLISH_TOKEN }}
